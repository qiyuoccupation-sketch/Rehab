<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>PDF轉Word含OCR</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}:root{--teal:#0d9488;--teal-d:#0f766e;--ink:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--bg:#f8fafc;}body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}header{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px;}.hico{width:38px;height:38px;background:linear-gradient(135deg,#0d9488,#0891b2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}.htxt{font-size:18px;font-weight:700;}.hsub{font-size:11px;color:var(--muted);}.main{max-width:720px;margin:0 auto;padding:28px 16px;}.tabs{display:flex;background:#fff;border-radius:12px;padding:4px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:16px;gap:4px;}.tab{flex:1;padding:10px;text-align:center;border:none;background:transparent;border-radius:9px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;}.tab.on{background:var(--teal);color:#fff;}.notice{border-radius:10px;padding:12px 15px;font-size:12px;line-height:1.7;margin-bottom:14px;}.ny{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}.nb{background:#e0f2fe;border:1px solid #bae6fd;color:#075985;}.lr{display:flex;align-items:center;gap:9px;background:#fff;border-radius:10px;padding:11px 14px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:14px;}.lr label{font-size:13px;font-weight:600;white-space:nowrap;}.lr select{flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:'Noto Sans TC',sans-serif;font-size:13px;outline:none;}.drop{border:2.5px dashed #cbd5e1;border-radius:15px;background:#fff;padding:40px 24px;text-align:center;cursor:pointer;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:14px;transition:all .25s;}.drop:hover,.drop.drag{border-color:var(--teal);background:#f0fdfa;}.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}.dico{font-size:44px;margin-bottom:12px;animation:fl 3s ease-in-out infinite;}@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}.dtitle{font-size:19px;font-weight:700;margin-bottom:6px;}.dsub{font-size:13px;color:var(--muted);}.dbtn{display:inline-block;margin-top:13px;padding:9px 22px;background:var(--teal);color:#fff;border-radius:9px;font-size:14px;font-weight:700;}.fc{background:#fff;border-radius:10px;padding:13px 15px;display:flex;align-items:flex-start;gap:11px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:9px;border:1px solid var(--border);animation:si .2s ease;}@keyframes si{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}.fico{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,#fee2e2,#fecaca);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}.finfo{flex:1;min-width:0;}.fname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.fsize{font-size:11px;color:var(--muted);margin-top:2px;}.flog{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}.fbar{height:5px;background:#e2e8f0;border-radius:3px;margin-top:6px;display:none;overflow:hidden;}.fbar.on{display:block;}.ffill{height:100%;border-radius:3px;width:0;transition:width .3s;background:linear-gradient(90deg,#0d9488,#0891b2);}.fst{font-size:12px;font-weight:600;flex-shrink:0;padding-top:3px;}.fst.waiting{color:var(--muted);}.fst.converting{color:#d97706;}.fst.done{color:#0d9488;}.fst.error{color:#dc2626;}.frm{width:26px;height:26px;border-radius:50%;border:none;background:#f1f5f9;cursor:pointer;font-size:13px;color:var(--muted);flex-shrink:0;}.abar{display:flex;gap:9px;background:#fff;border-radius:12px;padding:13px 15px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:16px;align-items:center;flex-wrap:wrap;}.ainfo{flex:1;}.acnt{font-size:15px;font-weight:700;}.asub{font-size:12px;color:var(--muted);}.btn{padding:9px 18px;border-radius:9px;border:none;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}.bt{background:var(--teal);color:#fff;}.bt:disabled{background:#94a3b8;cursor:not-allowed;}.bo{background:transparent;border:1.5px solid var(--border);color:var(--muted);}.rc{background:#fff;border-radius:12px;padding:14px 17px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:11px;border-left:4px solid #0d9488;display:flex;align-items:center;gap:12px;animation:si .2s ease;}.rcico{font-size:26px;flex-shrink:0;}.rcinfo{flex:1;min-width:0;}.rcnm{font-size:14px;font-weight:700;margin-bottom:3px;}.rcmeta{font-size:12px;color:var(--muted);}.dlbtn{padding:8px 15px;border-radius:8px;border:none;background:linear-gradient(135deg,#0d9488,#0891b2);color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;}</style></head><body><header><div class="hico">📄</div><div><div class="htxt">PDF 轉 Word</div><div class="hsub">含 OCR 掃描辨識 · 免費 · 不上傳伺服器</div></div></header><div class="main"><div class="tabs"><button class="tab on" onclick="setMode('text',this)">📝 文字型 PDF</button><button class="tab" onclick="setMode('ocr',this)">🔍 掃描版 OCR</button></div><div class="notice ny" id="nt"><strong>文字型 PDF：</strong>適合 Word 存成 PDF、政府系統、醫院電子病歷輸出的 PDF。</div><div class="notice nb" id="no" style="display:none"><strong>🔍 OCR 模式：</strong>適合紙張掃描或拍照的 PDF。首次需下載語言包（約 15 MB），請保持網路連線。</div><div class="lr" id="lr" style="display:none"><label>🌐 語言：</label><select id="lang"><option value="chi_tra">繁體中文</option><option value="chi_tra+eng">繁中+英文</option><option value="chi_sim">簡體中文</option><option value="eng">英文</option></select></div><div class="drop" id="drop" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="onDrop(event)" onclick="document.getElementById('fi').click()"><input type="file" id="fi" accept=".pdf" multiple onchange="addFiles(this.files)"><div class="dico">📑</div><div class="dtitle">點擊或拖曳 PDF 到此處</div><div class="dsub" id="ds">支援批次上傳 · 最大 50 MB</div><div class="dbtn">選擇 PDF 檔案</div></div><div id="queue"></div><div class="abar" id="abar" style="display:none"><div class="ainfo"><div class="acnt" id="acnt">0 個檔案</div><div class="asub">準備轉換</div></div><button class="btn bo" onclick="clearAll()">🗑️ 清除</button><button class="btn bt" id="cb" onclick="go()">⚡ 開始轉換</button></div><div id="results"></div></div><script>let mode='text',files=[],L={pdf:0,docx:0,tess:0};function setMode(m,el){mode=m;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');document.getElementById('nt').style.display=m==='text'?'':'none';document.getElementById('no').style.display=m==='ocr'?'':'none';document.getElementById('lr').style.display=m==='ocr'?'':'none';document.getElementById('ds').textContent=m==='ocr'?'掃描版 PDF · OCR 辨識':'支援批次上傳 · 最大 50 MB';document.getElementById('cb').textContent=m==='ocr'?'🔍 OCR 辨識':'⚡ 開始轉換';}function onDrop(e){e.preventDefault();document.getElementById('drop').classList.remove('drag');addFiles(e.dataTransfer.files);}function addFiles(list){[...list].filter(f=>f.name.toLowerCase().endsWith('.pdf')).forEach(f=>{if(!files.find(x=>x.file.name===f.name&&x.file.size===f.size))files.push({id:Date.now()+Math.random(),file:f,status:'waiting',result:null,log:''});});render();}function render(){if(!files.length){document.getElementById('queue').innerHTML='';document.getElementById('abar').style.display='none';return;}document.getElementById('abar').style.display='flex';document.getElementById('acnt').textContent=files.length+' 個檔案';document.getElementById('queue').innerHTML=files.map(f=>`<div class="fc" id="fc${f.id}"><div class="fico">📄</div><div class="finfo"><div class="fname">${f.file.name}</div><div class="fsize">${(f.file.size/1024/1024).toFixed(2)} MB</div><div class="flog" id="lg${f.id}">${f.log}</div><div class="fbar ${f.status==='converting'?'on':''}" id="pb${f.id}"><div class="ffill" id="pf${f.id}"></div></div></div><div class="fst ${f.status}" id="st${f.id}">${{waiting:'等待中',converting:'處理中...',done:'✅ 完成',error:'❌ 失敗'}[f.status]}</div>${f.status==='waiting'?`<button class="frm" onclick="rm('${f.id}')">✕</button>`:''}</div>`).join('');}function lg(id,msg){const f=files.find(x=>String(x.id)===String(id));if(f)f.log=msg;const el=document.getElementById('lg'+id);if(el)el.textContent=msg;}function pg(id,p){const pb=document.getElementById('pb'+id),pf=document.getElementById('pf'+id);if(pb)pb.classList.add('on');if(pf)pf.style.width=p+'%';}function rm(id){files=files.filter(f=>String(f.id)!==String(id));render();}function clearAll(){files=[];render();document.getElementById('results').innerHTML='';}function lds(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error(src));document.head.appendChild(s);});}async function go(){const w=files.filter(f=>f.status==='waiting');if(!w.length){alert('無待轉換檔案');return;}const btn=document.getElementById('cb');btn.disabled=true;btn.textContent='⏳ 載入中...';try{if(!L.pdf){await lds('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';L.pdf=1;}if(!L.docx){await lds('https://unpkg.com/docx@7.8.2/build/index.umd.js');L.docx=1;}if(mode==='ocr'&&!L.tess){btn.textContent='⏳ 載入OCR...';await lds('https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js');L.tess=1;}}catch(e){alert('載入工具失敗，請確認網路連線。\n'+e.message);btn.disabled=false;btn.textContent=mode==='ocr'?'🔍 OCR 辨識':'⚡ 開始轉換';return;}btn.textContent='⏳ 轉換中...';for(const f of w){if(mode==='ocr')await doOCR(f);else await doTxt(f);}btn.disabled=false;btn.textContent=mode==='ocr'?'🔍 OCR 辨識':'⚡ 開始轉換';}async function doTxt(fo){fo.status='converting';render();try{lg(fo.id,'讀取PDF...');pg(fo.id,10);const ab=await fo.file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab,cMapUrl:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',cMapPacked:true}).promise;const n=pdf.numPages;const pts=[];for(let i=1;i<=n;i++){lg(fo.id,`解析第${i}/${n}頁...`);const pg2=await pdf.getPage(i);const ct=await pg2.getTextContent({normalizeWhitespace:true});const lm=new Map();ct.items.forEach(it=>{if(!it.str)return;const y=Math.round(it.transform[5]/8)*8;if(!lm.has(y))lm.set(y,[]);lm.get(y).push({x:it.transform[4],s:it.str});});const lines=[...lm.entries()].sort((a,b)=>b[0]-a[0]).map(([,v])=>v.sort((a,b)=>a.x-b.x).map(x=>x.s).join('')).filter(l=>l.trim());pts.push({page:i,text:lines.join('\n')});pg(fo.id,20+Math.floor(i/n*58));}const total=pts.map(p=>p.text).join('').trim();if(!total)throw new Error('此PDF為掃描圖片，請切換到「掃描版OCR」模式。');lg(fo.id,'建立Word...');pg(fo.id,82);const blob=await mkDoc(fo.file.name,pts);pg(fo.id,100);lg(fo.id,`完成！共${n}頁`);fo.status='done';fo.result={blob,name:fo.file.name.replace(/\.pdf$/i,'.docx')};render();addRes(fo);}catch(e){fo.status='error';lg(fo.id,'⚠️'+(e.message||'失敗'));render();}}async function doOCR(fo){fo.status='converting';render();const lang=document.getElementById('lang').value;try{lg(fo.id,'讀取PDF...');pg(fo.id,5);const ab=await fo.file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab,cMapUrl:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',cMapPacked:true}).promise;const n=pdf.numPages;lg(fo.id,'初始化OCR（首次需下載語言包）...');const worker=await Tesseract.createWorker(lang,1,{logger:m=>{if(m.status==='loading language traineddata')lg(fo.id,`下載語言包${Math.round((m.progress||0)*100)}%...`);}});const pts=[];for(let i=1;i<=n;i++){lg(fo.id,`OCR辨識第${i}/${n}頁...`);const pg2=await pdf.getPage(i);const vp=pg2.getViewport({scale:2.5});const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;await pg2.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;const{data:{text}}=await worker.recognize(cv);pts.push({page:i,text:text.trim()});pg(fo.id,10+Math.floor(i/n*78));}await worker.terminate();const total=pts.map(p=>p.text).join('').trim();if(!total)throw new Error('OCR未能辨識文字，請確認影像清晰度。');lg(fo.id,'建立Word...');pg(fo.id,92);const blob=await mkDoc(fo.file.name,pts);pg(fo.id,100);lg(fo.id,`OCR完成！共${n}頁`);fo.status='done';fo.result={blob,name:fo.file.name.replace(/\.pdf$/i,'.docx')};render();addRes(fo);}catch(e){fo.status='error';lg(fo.id,'⚠️'+(e.message||'OCR失敗'));render();}}async function mkDoc(fname,pts){const{Document,Packer,Paragraph,TextRun,HeadingLevel,PageBreak}=docx;const ch=[];ch.push(new Paragraph({text:fname.replace(/\.pdf$/i,''),heading:HeadingLevel.HEADING_1}));ch.push(new Paragraph({text:''}));pts.forEach((pt,idx)=>{if(idx>0){ch.push(new Paragraph({children:[new PageBreak()]}));ch.push(new Paragraph({text:`──第${pt.page}頁──`,heading:HeadingLevel.HEADING_2}));ch.push(new Paragraph({text:''}));}pt.text.split('\n').forEach(line=>{const t=line.trim();if(!t){ch.push(new Paragraph({text:''}));return;}const h=t.length<25&&(t.endsWith('：')||t.endsWith(':')||/^[\u4e00-\u9fff]{2,12}$/.test(t));ch.push(new Paragraph({children:[new TextRun({text:t,size:h?26:22,bold:h})],spacing:{before:h?160:40,after:h?80:60}}));});});const d=new Document({sections:[{properties:{page:{margin:{top:1134,right:851,bottom:1134,left:1134}}},children:ch}]});return await Packer.toBlob(d);}function addRes(fo){const el=document.getElementById('results');const d=document.createElement('div');d.className='rc';d.innerHTML=`<div class="rcico">📝</div><div class="rcinfo"><div class="rcnm">${fo.result.name}</div><div class="rcmeta">完成·${(fo.result.blob.size/1024).toFixed(1)}KB</div></div><button class="dlbtn" onclick="dl('${fo.id}')">⬇下載.docx</button>`;el.insertBefore(d,el.firstChild);}function dl(id){const f=files.find(x=>String(x.id)===String(id));if(!f||!f.result)return;const u=URL.createObjectURL(f.result.blob);const a=document.createElement('a');a.href=u;a.download=f.result.name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}</script></body></html>
